<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="api.css">
    <title>API Demo</title>
</head>
<body>
    <div class="app-container">
        <div class="emoji-display"></div>
        <div class="emoji-name"></div>
        <button class="rand-btn">Get Emoji</button>
    </div>

    <script defer>
        const btn = document.querySelector(".rand-btn");
        const display = document.querySelector(".emoji-display");
        const nameDisplay = document.querySelector(".emoji-name");

        async function getData() {
            const response = await fetch("https://emojihub.yurace.pro/api/random");
            const data = await response.json();

            display.innerHTML = data.htmlCode[0];
            nameDisplay.innerHTML = data.name;
        }

        btn.addEventListener("click", getData);

        getData();
    </script>
</body>
</html>
