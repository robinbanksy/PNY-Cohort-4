<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Box Sizing</title>
    <style>
        .box {
            border: solid 1px black;
            padding: 20px;
            margin: 20px;
            transition: all 0.3s ease;
        }

        .parent {
            width: 300px;
            border: solid 2px black;
        }

        .child {
            width: 100%;
            border-width: 10px;
            border-color: red;
        }

        .border-box .box {
            box-sizing: border-box;
        }

        .controls {
            width: 100%;
            display: flex;
            gap: 10px;
            justify-content: center;
            align-items: center;
            position: fixed;
            bottom: 20px;
            left: 0px;
        }
        .controls::before {
            content: "";
            position: absolute;
            width: 100%;
            height: 1px;
            background-color: #969696;
            top: -20px;
        }
        .controls button {
            padding: 7px 15px;
            font-size: 16px;
            cursor: pointer;
            border: none;
            border-radius: 5px;
            background-color: #007BFF;
            color: white;
            transition: all 0.3s ease;
        }
        .controls button:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>
    <div class="box parent">
        This is a box.
        <div class="box child">This is a box in a box.</div>
    </div>
    <div class="controls">
        <button>Toggle Border-Box</button>
    </div>

    <script>
        const toggleButton = document.querySelector('.controls button');
        const parentBox = document.querySelector('.parent');
        toggleButton.addEventListener('click', () => {
            parentBox.classList.toggle('border-box');
        });
    </script>
</body>
</html>
