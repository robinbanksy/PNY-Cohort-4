<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Margin Demo</title>
    <style>
        * {
            margin: 0;
        }

        .box {
            background-color: rgb(78, 214, 244);
        }
    </style>
</head>
<body>
    <div class="box">With the margins on all elements removed, there is now no empty space around the element, so the background color extends all the way to the edge of the viewport.</div>
</body>
</html>
